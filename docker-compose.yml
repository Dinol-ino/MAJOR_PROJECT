version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dfrag-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=dfrag
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dfrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/workspace/chroma_db
      - sqlite-data:/workspace/db
      - uploads-data:/workspace/uploads
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - DEFAULT_MODEL=qwen2.5:3b
      - CHROMA_PERSIST_DIR=/workspace/chroma_db
      - SQLITE_DB_PATH=/workspace/db/audit_log.db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dfrag
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/dfrag
      - PGVECTOR_DIMENSIONS=1024
      - REDIS_URL=redis://host.docker.internal:6379/0
      - SESSION_TTL_SECONDS=7200
      - CHROMA_LEGACY_ENABLED=true
      - UPLOAD_ROOT=/workspace/uploads
      - DEFAULT_WORKSPACE_ID=${DEFAULT_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_FILE_PAGES=${MAX_FILE_PAGES:-100}
      - OCR_ENABLED=${OCR_ENABLED:-false}
      - OCR_LANGUAGE=${OCR_LANGUAGE:-en}
      - OCR_MIN_TEXT_THRESHOLD=${OCR_MIN_TEXT_THRESHOLD:-0.15}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  chroma-data:
  sqlite-data:
  uploads-data:
  postgres-data: